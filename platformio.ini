[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Kecepatan Serial Monitor
monitor_speed = 115200

; DOWNLOAD LIBRARY OTOMATIS DI SINI
lib_deps =
    blynkkk/Blynk @ ^1.3.2
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    madhephaestus/ESP32Servo @ ^1.2.1